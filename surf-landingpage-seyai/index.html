<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[SeyAI] Pagina Captura · Higgsfield Soul 2 · thiago-surf-coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* SeyAI chrome (M1) */
  --chrome-top: 48px;
  --chrome-bot: 64px;
  --chrome-bg: #1A1B1E;
  --chrome-border: rgba(255,255,255,.06);
  --chrome-text: rgba(255,255,255,.5);
  --chrome-hi: rgba(255,255,255,.88);
  --chrome-accent: #2DD4BF;

  /* dark_premium surf palette (PROP-011 L1 + L6) */
  --navy-deep: #051B2C;
  --navy: #0A2540;
  --ocean: #1B6B93;
  --turquoise: #14B8A6;
  --aqua: #2DD4BF;
  --aqua-glow: rgba(45,212,191,0.35);
  --aqua-soft: rgba(45,212,191,0.12);
  --sand: #F4D58D;
  --white: #F5FFFE;
  --pure-white: #FFFFFF;
  --bg-light: #EFFEFA;
  --text-dark: #0A2540;
  --text-mid: #3B6B8A;
  --text-muted: #8BADC0;
  --font-h: 'Outfit', system-ui, sans-serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ══ CHROME TOP (M1) ══ */
.sy-top{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--chrome-top);background:var(--chrome-bg);border-bottom:1px solid var(--chrome-border);display:flex;align-items:center;gap:12px;padding:0 16px;font-family:'Inter',var(--font-b);font-size:12px;}
.sy-brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sy-logo{width:22px;height:22px;border-radius:5px;background:var(--chrome-accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:900;font-size:13px;color:#0A1816;flex-shrink:0;box-shadow:0 0 12px rgba(45,212,191,.4);}
.sy-name{font-family:var(--font-h);font-weight:700;font-size:13px;color:var(--chrome-hi);letter-spacing:.02em;}
.sy-pill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome-accent);background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.22);border-radius:999px;padding:2px 8px;flex-shrink:0;}
.sy-sep{width:1px;height:18px;background:var(--chrome-border);flex-shrink:0;}
.sy-meta{display:flex;align-items:center;gap:10px;flex:1;min-width:0;color:var(--chrome-text);font-size:11px;overflow:hidden;}
.sy-meta span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sy-meta strong{color:var(--chrome-hi);}
.sy-dv{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sy-dv select{background:rgba(255,255,255,.06);border:1px solid var(--chrome-border);border-radius:5px;color:var(--chrome-text);font-family:'Inter',sans-serif;font-size:10px;padding:3px 6px;cursor:pointer;outline:none;}
.sy-dv select:hover{border-color:rgba(255,255,255,.15);}
.sy-motor{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome-accent);opacity:.85;white-space:nowrap;}

/* ══ CHROME BOTTOM (M1) ══ */
.sy-bot{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:var(--chrome-bot);background:var(--chrome-bg);border-top:1px solid var(--chrome-border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-family:'Inter',sans-serif;}
.sy-info-title{font-size:12px;font-weight:500;color:var(--chrome-hi);}
.sy-info-sub{font-size:10px;color:var(--chrome-text);margin-top:2px;letter-spacing:.04em;}
.sy-actions{display:flex;align-items:center;gap:8px;}
.sy-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--chrome-border);background:rgba(255,255,255,.06);color:var(--chrome-hi);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:background .15s,border-color .15s;}
.sy-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.15);}
.sy-btn.primary{background:var(--chrome-accent);border-color:var(--chrome-accent);color:#0A1816;font-weight:600;box-shadow:0 0 16px rgba(45,212,191,.4);}
.sy-btn.primary:hover{background:#5EEAD4;border-color:#5EEAD4;}

/* ══ PAGE BASE (PROP-010 — free scroll) ══ */
html{overflow-y:scroll;scroll-behavior:smooth;}
body{
  background:var(--navy-deep);
  color:var(--white);
  font-family:var(--font-b);font-weight:400;line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding-top:var(--chrome-top);
  padding-bottom:var(--chrome-bot);
}

/* ══ SECTIONS ══ */
.section{position:relative;width:100%;min-height:calc(100vh - var(--chrome-top) - var(--chrome-bot));overflow:hidden;}
.section-progress{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(45,212,191,.08);z-index:6;}
.section-progress-fill{height:100%;background:linear-gradient(90deg,var(--turquoise),var(--aqua));box-shadow:0 0 12px var(--aqua-glow);}

/* ══ NAV DOTS (L4 glow) ══ */
.nav-dots{position:fixed;right:24px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:18px;z-index:100;}
.nav-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:transparent;cursor:pointer;transition:all .3s;padding:0;position:relative;}
.nav-dot.active{background:var(--aqua);border-color:var(--aqua);box-shadow:0 0 14px var(--aqua-glow);}
.nav-dot:hover{border-color:var(--aqua);}
.nav-dot-label{position:absolute;right:22px;top:50%;transform:translateY(-50%);font-family:var(--font-h);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;}
.nav-dot:hover .nav-dot-label,.nav-dot.active .nav-dot-label{opacity:1;}

/* ══ BUBBLES PARTICLES (L8) ══ */
.bubbles-wrap{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
.bubble{position:absolute;bottom:-10%;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(45,212,191,.35),rgba(45,212,191,.06));animation:bubble-rise linear infinite;}
@keyframes bubble-rise{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  8%{opacity:.5;}
  50%{transform:translateY(-55vh) translateX(var(--drift,10px));opacity:.3;}
  100%{transform:translateY(-110vh) translateX(calc(var(--drift,10px)*1.5));opacity:0;}
}

/* ══ WAVE DIVIDER (L7) ══ */
.wave-div{position:absolute;left:0;right:0;line-height:0;z-index:5;pointer-events:none;}
.wave-div.bottom{bottom:-1px;}
.wave-div.top{top:-1px;transform:scaleY(-1);}
.wave-div svg{width:100%;height:70px;display:block;}

/* ══ SCROLL HINT ══ */
.scroll-hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.35);font-family:var(--font-b);font-size:10px;letter-spacing:.22em;text-transform:uppercase;pointer-events:none;}
.scroll-arrow{width:14px;height:14px;border-right:2px solid var(--aqua);border-bottom:2px solid var(--aqua);transform:rotate(45deg);animation:arrow-bounce 2s ease-in-out infinite;}
@keyframes arrow-bounce{0%,100%{transform:rotate(45deg) translateY(0);opacity:.3;}50%{transform:rotate(45deg) translateY(6px);opacity:1;}}

/* ══ S1 HERO — base ══ */
.hero{background:var(--navy-deep);}
.hero-layout{position:relative;min-height:calc(100vh - var(--chrome-top) - var(--chrome-bot));}
.hero-content{position:relative;z-index:3;display:flex;flex-direction:column;justify-content:center;padding:80px 48px 120px 72px;max-width:600px;min-height:calc(100vh - var(--chrome-top) - var(--chrome-bot));}
.hero-img-col{overflow:hidden;}
.hero-img-col img{width:100%;height:100%;object-fit:cover;display:block;will-change:transform;}

/* ══ L3 FULL-BLEED (default) — image absolute, text overlay ══ */
.hero[data-layout="L3"] .hero-img-col{position:absolute;inset:0;}
.hero[data-layout="L3"] .hero-img-col img{
  object-position:62% center;
  -webkit-mask-image:
    linear-gradient(105deg, transparent 0%, rgba(0,0,0,.15) 18%, rgba(0,0,0,.5) 30%, black 46%),
    linear-gradient(to bottom, rgba(0,0,0,.4) 0%, black 12%, black 86%, transparent 100%);
  mask-image:
    linear-gradient(105deg, transparent 0%, rgba(0,0,0,.15) 18%, rgba(0,0,0,.5) 30%, black 46%),
    linear-gradient(to bottom, rgba(0,0,0,.4) 0%, black 12%, black 86%, transparent 100%);
  -webkit-mask-composite:source-in;
  mask-composite:intersect;
}

/* ══ L1 SPLIT — text left, image right rectangle ══ */
.hero[data-layout="L1"] .hero-layout{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;}
.hero[data-layout="L1"] .hero-content{padding:60px 36px 60px 72px;max-width:none;}
.hero[data-layout="L1"] .hero-img-col{position:relative;inset:auto;background:linear-gradient(160deg,var(--navy) 0%,var(--ocean) 100%);}
.hero[data-layout="L1"] .hero-img-col img{object-position:65% center;}

/* ══ L2 FUSAO CSS — split with mask + glow + ambient ══ */
.hero[data-layout="L2"] .hero-layout{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;position:relative;}
.hero[data-layout="L2"] .hero-layout::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(45,212,191,.18) 0%,transparent 55%);pointer-events:none;z-index:1;}
.hero[data-layout="L2"] .hero-content{padding:60px 36px 60px 72px;max-width:none;position:relative;z-index:3;}
.hero[data-layout="L2"] .hero-img-col{position:relative;inset:auto;background:transparent;filter:drop-shadow(0 0 60px rgba(45,212,191,.25));z-index:2;}
.hero[data-layout="L2"] .hero-img-col img{
  object-position:65% center;
  -webkit-mask-image:linear-gradient(180deg,#000 65%,rgba(0,0,0,.7) 82%,transparent 100%),linear-gradient(90deg,transparent 0%,#000 14%,#000 86%,transparent 100%);
  mask-image:linear-gradient(180deg,#000 65%,rgba(0,0,0,.7) 82%,transparent 100%),linear-gradient(90deg,transparent 0%,#000 14%,#000 86%,transparent 100%);
  -webkit-mask-composite:source-in;mask-composite:intersect;
}

/* Eyebrow tag with pulsing dot (L14) */
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.25);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--aqua);font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:7px 18px;border-radius:999px;width:fit-content;margin-bottom:32px;}
.eyebrow-dot{width:7px;height:7px;border-radius:50%;background:var(--aqua);box-shadow:0 0 10px var(--aqua);animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse-dot{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

/* Hero typography with glow (L4) */
.hero-title{font-family:var(--font-h);font-weight:900;font-size:clamp(34px,4.8vw,62px);line-height:1.04;color:var(--pure-white);margin-bottom:22px;letter-spacing:-.025em;}
.hero-title em{font-style:normal;color:var(--aqua);text-shadow:0 0 40px var(--aqua-glow);}
.title-line{display:block;overflow:hidden;}
.title-line > span{display:inline-block;}

.hero-sub{font-size:17px;line-height:1.7;color:rgba(255,255,255,.75);margin-bottom:12px;max-width:480px;}
.hero-support{font-size:14px;line-height:1.7;color:rgba(255,255,255,.45);margin-bottom:36px;max-width:460px;}

/* Glass form card (L2) */
.form-card{background:rgba(255,255,255,.05);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;max-width:420px;display:flex;flex-direction:column;gap:10px;}
.form-card input{width:100%;padding:14px 18px;border:1px solid rgba(255,255,255,.1);border-radius:11px;background:rgba(255,255,255,.06);font-family:var(--font-b);font-size:15px;color:var(--pure-white);outline:none;transition:border-color .3s,box-shadow .3s;}
.form-card input:focus{border-color:var(--aqua);box-shadow:0 0 0 3px var(--aqua-glow);}
.form-card input::placeholder{color:rgba(255,255,255,.3);}

/* CTA gradient + arrow (L3, L13) + glow */
.cta-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 24px;border-radius:11px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--turquoise),var(--aqua));color:var(--navy-deep);font-family:var(--font-h);font-weight:800;font-size:16px;transition:transform .2s,box-shadow .3s;position:relative;overflow:hidden;}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px var(--aqua-glow);}
.cta-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.28) 0%,transparent 60%);opacity:0;transition:opacity .3s;}
.cta-btn:hover::before{opacity:1;}
.cta-btn svg{flex-shrink:0;}

.form-proof{font-size:12px;color:rgba(255,255,255,.32);text-align:center;margin-top:4px;}

/* ══ S2 BENEFITS ══ */
.benefits{background:var(--white);display:flex;align-items:center;justify-content:center;padding:100px 48px;}
.benefits-inner{max-width:760px;width:100%;}
.s-tag{font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--turquoise);margin-bottom:16px;}
.s-title{font-family:var(--font-h);font-weight:900;font-size:clamp(28px,3.6vw,46px);line-height:1.1;color:var(--text-dark);margin-bottom:14px;letter-spacing:-.02em;}
.s-title em{font-style:normal;color:var(--turquoise);}
.s-lead{font-size:16px;color:var(--text-mid);margin-bottom:42px;max-width:560px;}

/* Bullet items with chip-style numbers (L11) */
.bullet-list{display:flex;flex-direction:column;gap:0;}
.bullet-item{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid rgba(20,184,166,.1);}
.bullet-item:last-child{border-bottom:none;}
.bullet-num{font-family:var(--font-h);font-weight:900;font-size:13px;color:var(--turquoise);min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(20,184,166,.08);border:1px solid rgba(20,184,166,.18);border-radius:9px;flex-shrink:0;margin-top:1px;letter-spacing:.04em;}
.bullet-text{font-size:15px;line-height:1.65;color:var(--text-mid);}
.bullet-text strong{color:var(--text-dark);font-weight:600;}
.benefits-foot{font-size:14px;color:var(--text-muted);margin-top:32px;padding-top:20px;border-top:1px solid rgba(20,184,166,.1);}

/* ══ S3 SOCIAL PROOF ══ */
.social-proof{background:var(--bg-light);display:flex;align-items:center;justify-content:center;padding:100px 48px;}
.social-inner{max-width:780px;width:100%;}
.testi-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:36px;}
.testi-card{background:var(--pure-white);border-radius:18px;padding:32px 30px;position:relative;box-shadow:0 6px 28px rgba(10,37,64,.06);border-top:3px solid var(--turquoise);transition:transform .3s,box-shadow .3s;}
.testi-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(10,37,64,.1);}
/* Decorative quote mark (L12) */
.testi-quote-mark{font-family:var(--font-h);font-size:56px;font-weight:900;line-height:1;color:rgba(20,184,166,.14);position:absolute;top:12px;right:20px;}
.testi-card blockquote{font-size:15px;line-height:1.7;color:var(--text-mid);font-style:italic;margin-bottom:16px;position:relative;z-index:1;}
.testi-card cite{font-family:var(--font-h);font-weight:700;font-size:14px;color:var(--text-dark);font-style:normal;}
.smoke-label{display:block;font-size:10px;color:var(--text-muted);margin-top:6px;font-style:italic;letter-spacing:.04em;}

/* ══ S4 CTA REPETIDO ══ */
.cta-section{background:linear-gradient(170deg,var(--navy) 0%,var(--navy-deep) 100%);display:flex;align-items:center;justify-content:center;padding:100px 48px;text-align:center;}
.cta-inner{max-width:580px;width:100%;position:relative;z-index:3;}
.cta-title{font-family:var(--font-h);font-weight:900;font-size:clamp(30px,4.4vw,52px);line-height:1.06;color:var(--pure-white);margin-bottom:16px;letter-spacing:-.02em;}
.cta-subtitle{font-size:16px;color:rgba(255,255,255,.65);margin-bottom:40px;}
.cta-form-card{margin:0 auto;}

/* ══ S5 LEGAL ══ */
.legal{background:var(--navy-deep);min-height:auto !important;}
.legal-inner{max-width:540px;margin:0 auto;padding:56px 32px;text-align:center;}
.legal-text{font-size:12px;line-height:1.85;color:rgba(255,255,255,.3);}
.legal-text a{color:var(--aqua);text-decoration:none;}
.legal-bar{width:40px;height:2px;background:rgba(45,212,191,.2);margin:22px auto;}
.legal-brand{font-family:var(--font-h);font-size:11px;font-weight:600;color:rgba(255,255,255,.22);letter-spacing:.12em;text-transform:uppercase;}

/* ══ RESPONSIVE — mobile hero stack (L10) ══ */
@media(max-width:900px){.hero-content{padding:60px 36px 100px 44px;}}
@media(max-width:768px){
  .hero-layout{min-height:auto;display:flex;flex-direction:column;}
  .hero-content{padding:48px 24px 36px;min-height:auto;max-width:100%;}
  .hero-img-col{position:relative;height:55vh;order:2;inset:auto;}
  .hero-img-col img{
    object-position:center 22%;
    -webkit-mask-image:linear-gradient(to bottom,var(--navy-deep) 0%,transparent 28%,transparent 72%,var(--navy-deep) 100%);
    mask-image:linear-gradient(to bottom,var(--navy-deep) 0%,transparent 28%,transparent 72%,var(--navy-deep) 100%);
    -webkit-mask-composite:source-in;mask-composite:intersect;
  }
  .hero-title{font-size:clamp(30px,8vw,42px);}
  .benefits,.social-proof,.cta-section{padding:72px 24px;}
  .testi-grid{grid-template-columns:1fr;}
  .form-card{padding:22px;}
  .nav-dots{right:14px;gap:14px;}
  .nav-dot{width:10px;height:10px;}
  .nav-dot-label{display:none;}
  .sy-meta{display:none;}
}
@media(max-width:380px){
  .hero-content{padding:40px 20px 28px;}
}
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>

/* Chrome interactions (vanilla, fora de React) */

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ── Easings library (L5) ── */
const clamp = (v, lo=0, hi=1) => Math.max(lo, Math.min(hi, v));
const sub = (time, start, end) => clamp((time - start) / (end - start));
const ease = {
  outCubic: t => 1 - Math.pow(1 - t, 3),
  outExpo: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  outBack: t => { const c = 1.70158; return 1 + (c+1)*Math.pow(t-1,3) + c*Math.pow(t-1,2); },
  outQuint: t => 1 - Math.pow(1 - t, 5),
};
function fadeUp(time, start, end, dy=24){
  const p = ease.outCubic(sub(time, start, end || start+0.5));
  return { opacity:p, transform:`translateY(${(1-p)*dy}px)` };
}
function fadeIn(time, start, end){
  return { opacity: ease.outCubic(sub(time, start, end || start+0.4)) };
}
function slideIn(time, start, end, dx=-30){
  const p = ease.outExpo(sub(time, start, end || start+0.6));
  return { opacity:p, transform:`translateX(${(1-p)*dx}px)` };
}
function scaleIn(time, start, end){
  const p = ease.outBack(sub(time, start, end || start+0.55));
  return { opacity: Math.min(p*1.5, 1), transform:`scale(${0.82 + 0.18*p})` };
}
function clipReveal(time, start, end){
  const p = ease.outExpo(sub(time, start, end || start+0.7));
  return { clipPath:`inset(0 ${(1-p)*100}% 0 0)`, opacity: p > 0.01 ? 1 : 0 };
}

/* ── useAnimTimer (IntersectionObserver, replay on re-entry) ── */
function useAnimTimer(ref, duration, threshold=0.25){
  const [time, setTime] = useState(0);
  const [active, setActive] = useState(false);
  const rafRef = useRef(null);
  const startRef = useRef(null);

  useEffect(() => {
    if(!ref.current) return;
    const io = new IntersectionObserver(entries => {
      const e = entries[0];
      setActive(e.isIntersecting && e.intersectionRatio >= threshold);
    }, { threshold: [0, threshold, 0.6, 1] });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [ref, threshold]);

  useEffect(() => {
    if(!active){
      setTime(0); startRef.current = null;
      if(rafRef.current) cancelAnimationFrame(rafRef.current);
      return;
    }
    startRef.current = null;
    const step = ts => {
      if(startRef.current == null) startRef.current = ts;
      const t = (ts - startRef.current) / 1000;
      if(t >= duration){ setTime(duration); return; }
      setTime(t);
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [active, duration]);

  return { time, active, progress: clamp(time/duration) };
}

/* ── AnimatedSection wrapper ── */
function AnimatedSection({ id, className, duration, children, style }){
  const ref = useRef(null);
  const timer = useAnimTimer(ref, duration);
  return (
    <section ref={ref} id={id} className={`section ${className||''}`} style={style}>
      <div className="section-progress"><div className="section-progress-fill" style={{width:(timer.progress*100)+'%'}}/></div>
      {typeof children === 'function' ? children({...timer, duration}) : children}
    </section>
  );
}

/* ── Bubbles particle system (L8) ── */
function Bubbles({ count=18, active }){
  const items = useMemo(() => Array.from({length:count}, (_, i) => ({
    id:i,
    x: Math.random()*100,
    size: 2 + Math.random()*5,
    delay: Math.random()*4,
    dur: 4 + Math.random()*5,
    drift: (Math.random()-0.5)*40,
  })), [count]);
  return (
    <div className="bubbles-wrap">
      {items.map(b => (
        <span key={b.id} className="bubble" style={{
          left: b.x+'%', width:b.size, height:b.size,
          animationDuration: b.dur+'s', animationDelay: b.delay+'s',
          '--drift': b.drift+'px',
          animationPlayState: active ? 'running' : 'paused',
          opacity: active ? undefined : 0,
        }}/>
      ))}
    </div>
  );
}

/* ── Wave SVG Divider (L7) ── */
function WaveDivider({ fill, flip }){
  return (
    <div className={`wave-div ${flip ? 'top' : 'bottom'}`}>
      <svg viewBox="0 0 1440 100" preserveAspectRatio="none">
        <path d="M0,60 C240,100 480,20 720,55 C960,90 1200,25 1440,50 L1440,100 L0,100Z" fill={fill} opacity="0.5"/>
        <path d="M0,70 C300,30 600,85 900,50 C1100,25 1300,70 1440,40 L1440,100 L0,100Z" fill={fill}/>
      </svg>
    </div>
  );
}

/* ── Nav Dots with labels (L4 glow) ── */
function NavDots(){
  const ids = ['hero','benefits','social','cta','legal'];
  const labels = ['Inicio','Aprender','Prova','Baixar','Legal'];
  const [active, setActive] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const secs = ids.map(id => document.getElementById(id)).filter(Boolean);
      let best = 0, bestDist = Infinity;
      secs.forEach((s, i) => {
        const r = s.getBoundingClientRect();
        const dist = Math.abs(r.top + r.height/2 - window.innerHeight/2);
        if(dist < bestDist){ bestDist = dist; best = i; }
      });
      setActive(best);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive:true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className="nav-dots" aria-label="Navegacao">
      {ids.map((id, i) => (
        <button key={id} className={`nav-dot ${i===active ? 'active' : ''}`} onClick={() => {
          const el = document.getElementById(id);
          if(el) window.scrollTo({ top: el.offsetTop, behavior:'smooth' });
        }} aria-label={labels[i]}>
          <span className="nav-dot-label">{labels[i]}</span>
        </button>
      ))}
    </nav>
  );
}
