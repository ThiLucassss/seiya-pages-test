<style>
:root {
  --chrome-top: 48px;
  --chrome-bot: 64px;
  --chrome-bg: #1A1B1E;
  --chrome-border: rgba(255,255,255,.06);
  --chrome-text: rgba(255,255,255,.5);
  --chrome-hi: rgba(255,255,255,.88);
  --chrome-accent: #62B6CB;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ══ CHROME TOP ══ */
.sy-top{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--chrome-top);background:var(--chrome-bg);border-bottom:1px solid var(--chrome-border);display:flex;align-items:center;gap:12px;padding:0 16px;font-family:var(--body);font-size:12px;}
.sy-brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sy-logo{width:22px;height:22px;border-radius:5px;background:var(--chrome-accent);display:flex;align-items:center;justify-content:center;font-family:var(--title);font-weight:900;font-size:13px;color:#fff;flex-shrink:0;}
.sy-name{font-family:var(--title);font-weight:700;font-size:13px;color:var(--chrome-hi);letter-spacing:.02em;}
.sy-pill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome-accent);background:rgba(98,182,203,.12);border:1px solid rgba(98,182,203,.22);border-radius:999px;padding:2px 8px;flex-shrink:0;}
.sy-sep{width:1px;height:18px;background:var(--chrome-border);flex-shrink:0;}
.sy-meta{display:flex;align-items:center;gap:10px;flex:1;min-width:0;color:var(--chrome-text);font-size:11px;overflow:hidden;}

.sy-dv{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ══ CHROME BOTTOM ══ */

.sy-info-title{font-size:12px;font-weight:500;color:var(--chrome-hi);}
.sy-info-sub{font-size:10px;color:var(--chrome-text);margin-top:2px;letter-spacing:.04em;}
.sy-actions{display:flex;align-items:center;gap:8px;}
.sy-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--chrome-border);background:rgba(255,255,255,.06);color:var(--chrome-hi);font-family:var(--body);font-size:11px;cursor:pointer;transition:background .15s,border-color .15s;text-decoration:none;display:inline-block;}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const clamp=(v,lo=0,hi=1)=>Math.max(lo,Math.min(hi,v));
const sub=(t,a,b)=>clamp((t-a)/(b-a));
const easeOut=t=>1-Math.pow(1-t,3);
function fadeUp(t,a,b,dy=14){const p=easeOut(sub(t,a,b||a+0.4));return {opacity:p,transform:`translateY(${(1-p)*dy}px)`};}

function useAnimTimer(ref, duration, threshold=0.3){
  const [time, setTime] = useState(0);
  const [active, setActive] = useState(false);
  const rafRef = useRef(null), startRef = useRef(null);
  useEffect(() => {
    if(!ref.current) return;
    const io = new IntersectionObserver(e => {
      setActive(e[0].isIntersecting && e[0].intersectionRatio >= threshold);
    }, { threshold:[0, threshold, 0.6, 1] });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [ref, threshold]);
  useEffect(() => {
    if(!active){setTime(0); startRef.current=null; if(rafRef.current)cancelAnimationFrame(rafRef.current); return;}
    startRef.current=null;
    const step = ts => {if(startRef.current==null)startRef.current=ts; const t=(ts-startRef.current)/1000; if(t>=duration){setTime(duration);return;} setTime(t); rafRef.current=requestAnimationFrame(step);};
    rafRef.current = requestAnimationFrame(step);
    return () => {if(rafRef.current)cancelAnimationFrame(rafRef.current);};
  }, [active, duration]);
  return { time, active, progress: clamp(time/duration) };
}

function AnimatedSection({id, className, duration, children, style}){
  const ref = useRef(null);
  const timer = useAnimTimer(ref, duration);
  return (
    <section ref={ref} id={id} className={`section ${className||''}`} style={style}>
      <div className="section-progress"><div className="section-progress-fill" style={{width:(timer.progress*100)+'%'}}/></div>
      {typeof children === 'function' ? children({...timer, duration}) : children}
    </section>
  );
}

function NavDots(){
  const ids=['hero','benefits','social','cta','legal'];
  const labels=['Inicio','Aprender','Prova','Baixar','Legal'];
  const [active,setActive]=useState(0);
  useEffect(()=>{
    const onScroll = () => {
      const secs = ids.map(id => document.getElementById(id)).filter(Boolean);
      let best=0,bestDist=Infinity;
      secs.forEach((s,i) => {
        const r = s.getBoundingClientRect();
        const dist = Math.abs(r.top + r.height/2 - window.innerHeight/2);
        if(dist < bestDist){bestDist=dist; best=i;}
      });
      setActive(best);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  },[]);
  return (
    <nav className="nav-dots">
      {ids.map((id,i)=>(
        <button key={id} className={`nav-dot ${i===active?'active':''}`} onClick={()=>{const el=document.getElementById(id);if(el)window.scrollTo({top:el.offsetTop,behavior:'smooth'});}}>
          <span className="nav-dot-label">{labels[i]}</span>
        </button>
      ))}
    </nav>
  );
}

function SocialScene({time}){

    <div className="social-inner">
      <div className="s-tag" style={fadeUp(time, 0.1, 0.5)}>O que dizem</div>
      <h2 className="s-h2" style={fadeUp(time, 0.3, 0.8, 18)}>Quem ja eliminou esses erros</h2>
      <div className="s3-cards">
        <div className="testimonial" style={fadeUp(time, 0.6, 1.2, 20)}>
          <blockquote>"Eu ficava caindo sempre no lado direito e achei que era jeito. Era o joelho. Corrigi em uma aula."</blockquote>
          <cite>[Nome], [cidade]</cite>
          <div className="smoke-note">smoke — substituir por depoimento real</div>
        </div>
        <div className="testimonial" style={fadeUp(time, 0.9, 1.5, 20)}>
          <blockquote>"Tentei por meses sozinho. Li o ebook, entendi onde estava errando. Na aula seguinte fiquei em pe."</blockquote>
          <cite>[Nome], [cidade]</cite>
          <div className="smoke-note">smoke — substituir por depoimento real</div>
        </div>
      </div>
    </div>
  );
}

function CTAScene({time}){
  return (
    <div className="cta-inner">
      <h2 className="cta-h2" style={fadeUp(time, 0.1, 0.6, 20)}>Pronto pra eliminar esses erros?</h2>
      <p className="cta-sub-2" style={fadeUp(time, 0.4, 0.9)}>Receba o PDF gratis agora. Leia antes do proximo treino.</p>
      <div className="capture-form-2" style={fadeUp(time, 0.7, 1.3)}>
        <input type="text" placeholder="Primeiro nome (opcional)"/>
        <input type="email" placeholder="Seu melhor email" required/>
        <button className="cta-btn-2" onClick={e=>window.submitLead(e.currentTarget)}>Quero meu ebook gratis</button>
      </div>
    </div>
  );
}

function LegalScene({time}){
  return (
    <div className="legal-inner">
      <p className="legal-text" style={{opacity:clamp(sub(time,0.1,0.6))}}>Ao enviar seu email voce concorda em receber conteudos de Thiago Freitas sobre surf e tecnica de surf. Voce pode cancelar a qualquer momento. <a href="#">Politica de privacidade</a>.</p>
      <div className="legal-divider" style={{opacity:clamp(sub(time,0.5,0.9))}}/>
      <p className="motor-credit" style={{opacity:clamp(sub(time,0.7,1.1))}}>Imagens · Higgsfield Soul 2 · v1 bright_clean</p>
    </div>
  );
}

function App(){
  return (
    <>
      <AnimatedSection id="hero" className="hero" duration={4}>
        {t => <HeroScene {...t}/>}
      </AnimatedSection>
      <AnimatedSection id="benefits" className="benefits" duration={4}>
        {t => <BenefitsScene {...t}/>}
      </AnimatedSection>
      <AnimatedSection id="social" className="social" duration={2.5}>
        {t => <SocialScene {...t}/>}
      </AnimatedSection>
      <AnimatedSection id="cta" className="cta-section" duration={2.5}>
        {t => <CTAScene {...t}/>}
      </AnimatedSection>
      <AnimatedSection id="legal" className="legal" duration={1.5} style={{minHeight:'auto'}}>
        {t => <LegalScene {...t}/>}
      </AnimatedSection>
      <NavDots/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
