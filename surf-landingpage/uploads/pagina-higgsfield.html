  --chrome-top: 48px;

  --chrome-accent: #62B6CB;

  --navy: #1B4965;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ══ CHROME TOP ══ */

.sy-name{font-family:var(--title);font-weight:700;font-size:13px;color:var(--chrome-hi);letter-spacing:.02em;}
.sy-pill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--chrome-accent);background:rgba(98,182,203,.12);border:1px solid rgba(98,182,203,.22);border-radius:999px;padding:2px 8px;flex-shrink:0;}
.sy-sep{width:1px;height:18px;background:var(--chrome-border);flex-shrink:0;}
.sy-meta{display:flex;align-items:center;gap:10px;flex:1;min-width:0;color:var(--chrome-text);font-size:11px;overflow:hidden;}
.sy-meta span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sy-meta strong{color:var(--chrome-hi);}
.sy-dv{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ══ CHROME BOTTOM ══ */
.sy-bot{position:fixed;bottom:0;left:0;right:0;z-index:1000;height:var(--chrome-bot);background:var(--chrome-bg);border-top:1px solid var(--chrome-border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-family:var(--body);}
.sy-info-title{font-size:12px;font-weight:500;color:var(--chrome-hi);}

.sy-btn.primary:hover{background:#7ecadc;border-color:#7ecadc;}

/* ══ PAGE BASE — scroll TOTALMENTE LIVRE, sem scroll-snap ══ */
html{overflow-y:scroll;}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--body);font-weight:400;line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  padding-top:var(--chrome-top);
  padding-bottom:var(--chrome-bot);
}

/* ══ SLIDES (sections) ══ */
.vs-slide{
  position:relative;width:100%;
  min-height:calc(100vh - var(--chrome-top) - var(--chrome-bot));
  overflow:hidden;
}
.vs-progress{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(98,182,203,.08);z-index:5;}
.vs-progress-fill{height:100%;background:var(--aqua);box-shadow:0 0 6px rgba(98,182,203,.55);}
.vs-next{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:var(--body);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--fg-3);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:5;pointer-events:none;}
.vs-next-arrow{font-size:14px;color:var(--aqua);animation:bounce 1.6s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(8px);opacity:1}}

/* ══ STEP INDICATOR (lateral direita) ══ */
.step-ind{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:14px;z-index:150;font-family:var(--body);font-size:10px;letter-spacing:.2em;text-transform:uppercase;}
.step-ind-item{display:flex;align-items:center;gap:10px;justify-content:flex-end;color:var(--fg-3);transition:color 300ms;cursor:pointer;}
.step-ind-item.active{color:var(--aqua);}
.step-ind-bar{height:2px;background:var(--fg-3);border-radius:1px;transition:width 300ms,background 300ms,box-shadow 300ms;}
.step-ind-item.active .step-ind-bar{background:var(--aqua);box-shadow:0 0 6px var(--aqua);}
.step-ind-label{transition:opacity 300ms,transform 300ms;}

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Helpers ── */
const clamp = (v, lo=0, hi=1) => Math.max(lo, Math.min(hi, v));
const sub = (p, a, b) => clamp((p - a) / (b - a), 0, 1);
const easeOut = t => 1 - Math.pow(1 - t, 3);

function fadeUp(time, start, end, dy=14) {
  const e = end != null ? end : start + 0.4;
  const p = easeOut(sub(time, start, e));
  return { opacity: p, transform: `translateY(${(1 - p) * dy}px)` };
}
function fadeIn(time, start, end) {
  const e = end != null ? end : start + 0.4;
  return { opacity: easeOut(sub(time, start, e)) };
}

/* ── Hook: timer local por slide via IntersectionObserver ── */
function useVideoTimer(ref, duration, threshold=0.4){
  const [time, setTime] = useState(0);
  const [active, setActive] = useState(false);
  const rafRef = useRef(null);
  const startRef = useRef(null);

  useEffect(() => {
    if(!ref.current) return;
    const el = ref.current;
    const io = new IntersectionObserver((entries) => {
      const e = entries[0];
      setActive(e.isIntersecting && e.intersectionRatio >= threshold);
    }, { threshold: [0, threshold, 1] });
    io.observe(el);
    return () => io.disconnect();
  }, [ref, threshold]);

  useEffect(() => {
    if(!active){
      setTime(0); startRef.current = null;
      if(rafRef.current) cancelAnimationFrame(rafRef.current);
      return;
    }
    startRef.current = null;
    const step = (ts) => {
      if(startRef.current == null) startRef.current = ts;
      const t = (ts - startRef.current) / 1000;
      if(t >= duration){ setTime(duration); return; }
      setTime(t);
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if(rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [active, duration]);

  return { time, active, progress: clamp(time/duration, 0, 1) };
}

/* ── VideoSlide wrapper ── */
function VideoSlide({ id, duration, children }){
  const ref = useRef(null);
  const timer = useVideoTimer(ref, duration);
  return (
    <section ref={ref} id={id} className="vs-slide">
      <div className="vs-progress"><div className="vs-progress-fill" style={{width: (timer.progress * 100) + '%'}}/></div>
      {typeof children === 'function' ? children({...timer, duration}) : children}
    </section>
  );
}

/* ── Next Hint ── */
function NextHint({ visible }){
  if(!visible) return null;
  return (
    <div className="vs-next">
      <div>continue rolando</div>
      <div className="vs-next-arrow">↓</div>
    </div>
  );
}

/* ── Step Indicator (lateral direita) ── */
function StepIndicator({ items }){
  const [active, setActive] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const secs = document.querySelectorAll('.vs-slide');
      let best = 0, bestDist = Infinity;
      secs.forEach((s, i) => {
        const r = s.getBoundingClientRect();
        const center = Math.abs(r.top + r.height/2 - window.innerHeight/2);
        if(center < bestDist){ bestDist = center; best = i; }
      });
      setActive(best);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav className="step-ind">
      {items.map((label, i) => (
        <div key={i}
          className={'step-ind-item ' + (i === active ? 'active' : '')}
          onClick={() => document.querySelectorAll('.vs-slide')[i]?.scrollIntoView({behavior:'smooth'})}>
          <span className="step-ind-label" style={{
            opacity: i === active ? 1 : 0,
            transform: 'translateX(' + (i === active ? 0 : 8) + 'px)'
          }}>{label}</span>
          <div className="step-ind-bar" style={{ width: (i === active ? 24 : 6) + 'px' }}/>
        </div>
      ))}
    </nav>
  );
}

/* ══ SCENES ══ */

/* S1 HERO (duration 4.5s) */
function HeroScene({ time, duration }){
  const imgStyle = {
    opacity: easeOut(sub(time, 0, 0.9)),

  return (
    <>
      <div className="hero-bg">
        <img src="https://d8j0ntlcm91z4.cloudfront.net/user_3AfgSQ1pBB8qDlclTCouojEjQWJ/hf_20260511_191544_15f7a115-9087-4654-bbc2-8e64f2aa899b_min.webp" alt="Thiago Freitas surfando" style={imgStyle}/>
      </div>
      <div className="hero-left">
        <div className="hero-eyebrow" style={fadeUp(time, 0.3, 0.7)}>Ebook gratis · Surf para iniciantes</div>
        <h1 className="hero-h1">
          <span className="line"><span className="word" style={fadeUp(time, 0.5, 1.0, 44)}>Ainda nao fica</span></span>
          <span className="line"><span className="word" style={fadeUp(time, 0.8, 1.3, 44)}>em pe na <em>prancha?</em></span></span>
        </h1>
        <p className="hero-sub" style={fadeUp(time, 1.3, 1.7)}>Descubra os 7 erros que fazem iniciantes cairem sempre no mesmo ponto — e como eliminar cada um sem precisar de talento especial.</p>
