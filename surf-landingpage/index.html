<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiago Surf Coach — Ebook Grátis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy-deep: #051B2C;
  --navy: #0A2540;
  --ocean: #1B6B93;
  --turquoise: #14B8A6;
  --aqua: #2DD4BF;
  --aqua-glow: rgba(45,212,191,0.35);
  --sand: #F4D58D;
  --white: #F5FFFE;
  --pure-white: #FFFFFF;
  --bg-light: #EFFEFA;
  --text-dark: #0A2540;
  --text-mid: #3B6B8A;
  --text-muted: #8BADC0;
  --font-h: 'Outfit', sans-serif;
  --font-b: 'DM Sans', sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{overflow-y:scroll;scroll-behavior:smooth}
body{
  background:var(--navy-deep);color:var(--text-dark);
  font-family:var(--font-b);font-weight:400;line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* ── Section base ── */
.section{position:relative;width:100%;min-height:100vh;overflow:hidden}
.section-progress{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(45,212,191,0.08);z-index:10}
.section-progress-fill{height:100%;background:linear-gradient(90deg,var(--turquoise),var(--aqua));box-shadow:0 0 14px var(--aqua-glow)}

/* ═══ HERO ═══ */
.hero{background:var(--navy-deep)}
.hero-layout{position:relative;min-height:100vh}
.hero-content{
  position:relative;z-index:3;display:flex;flex-direction:column;justify-content:center;
  padding:80px 48px 120px 72px;max-width:580px;min-height:100vh;
}
.hero-img-col{
  position:absolute;inset:0;overflow:hidden;
}
.hero-img-col img{
  width:100%;height:100%;object-fit:cover;object-position:22% 20%;
  display:block;will-change:transform;
}
.hero-img-col::before{
  content:'';position:absolute;inset:0;z-index:2;
  background:linear-gradient(105deg,
    var(--navy-deep) 0%,
    rgba(5,27,44,.94) 16%,
    rgba(5,27,44,.7) 34%,
    rgba(5,27,44,.25) 54%,
    transparent 72%
  );
}
.hero-img-col::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:120px;z-index:2;
  background:linear-gradient(to top,var(--navy-deep),transparent);
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.25);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--aqua);font-family:var(--font-h);font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;padding:7px 18px;
  border-radius:999px;width:fit-content;margin-bottom:32px;
}
.eyebrow-dot{width:7px;height:7px;border-radius:50%;background:var(--aqua);box-shadow:0 0 10px var(--aqua);animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse-dot{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

.hero-title{font-family:var(--font-h);font-weight:900;font-size:clamp(34px,4.8vw,60px);line-height:1.04;color:var(--pure-white);margin-bottom:22px;letter-spacing:-.025em}
.hero-title em{font-style:normal;color:var(--aqua);text-shadow:0 0 40px var(--aqua-glow)}
.title-line{display:block;overflow:hidden}
.title-line > span{display:inline-block}

.hero-sub{font-size:17px;line-height:1.75;color:rgba(255,255,255,.72);margin-bottom:12px;max-width:490px}
.hero-support{font-size:15px;line-height:1.75;color:rgba(255,255,255,.45);margin-bottom:36px;max-width:470px}

/* ── Form card ── */
.form-card{
  background:rgba(255,255,255,.05);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;
  max-width:400px;display:flex;flex-direction:column;gap:10px;
}
.form-card input{
  width:100%;padding:14px 18px;border:1px solid rgba(255,255,255,.1);border-radius:11px;
  background:rgba(255,255,255,.06);font-family:var(--font-b);font-size:15px;color:var(--pure-white);
  outline:none;transition:border-color .3s,box-shadow .3s;
}
.form-card input:focus{border-color:var(--aqua);box-shadow:0 0 0 3px var(--aqua-glow)}
.form-card input::placeholder{color:rgba(255,255,255,.3)}

.cta-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:16px 24px;border-radius:11px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--turquoise),var(--aqua));
  color:var(--navy-deep);font-family:var(--font-h);font-weight:800;font-size:16px;
  transition:transform .2s,box-shadow .3s;position:relative;overflow:hidden;
}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--aqua-glow)}
.cta-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.cta-btn:hover::before{opacity:1}

.form-proof{font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-top:4px}

/* ── Wave divider ── */
.wave-div{position:absolute;bottom:-1px;left:0;right:0;z-index:5;line-height:0}
.wave-div svg{width:100%;height:70px;display:block}
.wave-div--top{bottom:auto;top:-1px;transform:scaleY(-1)}

/* ── Scroll hint ── */
.scroll-hint{
  position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:rgba(255,255,255,.35);font-family:var(--font-b);font-size:10px;
  letter-spacing:.22em;text-transform:uppercase;
}
.scroll-arrow{
  width:16px;height:16px;border-right:2px solid var(--aqua);border-bottom:2px solid var(--aqua);
  transform:rotate(45deg);animation:arrow-bounce 2s ease-in-out infinite;
}
@keyframes arrow-bounce{0%,100%{transform:rotate(45deg) translateY(0);opacity:.3}50%{transform:rotate(45deg) translateY(6px);opacity:1}}

/* ── Bubbles ── */
.bubbles-wrap{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.bubble{
  position:absolute;bottom:-10%;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(45,212,191,.35),rgba(45,212,191,.08));
  animation:bubble-rise linear infinite;
}
@keyframes bubble-rise{
  0%{transform:translateY(0) translateX(0);opacity:0}
  8%{opacity:.4}
  50%{transform:translateY(-55vh) translateX(var(--drift,10px));opacity:.25}
  100%{transform:translateY(-110vh) translateX(calc(var(--drift,10px)*1.5));opacity:0}
}

/* ═══ BENEFITS ═══ */
.benefits{background:var(--white);display:flex;align-items:center;justify-content:center;padding:100px 48px}
.benefits-inner{max-width:720px;width:100%}

.stag{
  font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.24em;
  text-transform:uppercase;color:var(--turquoise);margin-bottom:16px;
}
.stitle{
  font-family:var(--font-h);font-weight:900;font-size:clamp(26px,3.6vw,44px);
  line-height:1.12;color:var(--text-dark);margin-bottom:12px;letter-spacing:-.015em;
}
.slead{font-size:16px;color:var(--text-mid);margin-bottom:40px;max-width:520px}

.bullet-list{display:flex;flex-direction:column;gap:0}
.bullet-item{
  display:flex;align-items:flex-start;gap:16px;padding:15px 0;
  border-bottom:1px solid rgba(20,184,166,.1);
}
.bullet-item:last-child{border-bottom:none}
.bullet-num{
  font-family:var(--font-h);font-weight:900;font-size:13px;color:var(--turquoise);
  min-width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  background:rgba(20,184,166,.07);border-radius:9px;flex-shrink:0;margin-top:1px;
}
.bullet-text{font-size:15px;line-height:1.65;color:var(--text-mid)}
.bullet-text strong{color:var(--text-dark);font-weight:600}
.benefits-foot{font-size:14px;color:var(--text-muted);margin-top:28px;padding-top:16px;border-top:1px solid rgba(20,184,166,.08)}

/* ═══ SOCIAL PROOF ═══ */
.social-proof{background:var(--bg-light);display:flex;align-items:center;justify-content:center;padding:100px 48px}
.social-inner{max-width:720px;width:100%}
.testi-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:32px}
.testi-card{
  background:var(--pure-white);border-radius:18px;padding:30px;position:relative;
  box-shadow:0 6px 28px rgba(10,37,64,.06);border-top:3px solid var(--turquoise);
  transition:transform .3s,box-shadow .3s;
}
.testi-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(10,37,64,.1)}
.testi-quote{
  font-family:var(--font-h);font-size:52px;font-weight:900;line-height:1;
  color:rgba(20,184,166,.12);position:absolute;top:14px;right:20px;
}
.testi-card blockquote{font-size:15px;line-height:1.7;color:var(--text-mid);font-style:italic;margin-bottom:16px}
.testi-card cite{font-family:var(--font-h);font-weight:700;font-size:14px;color:var(--text-dark);font-style:normal}
.smoke-label{display:block;font-size:10px;color:var(--text-muted);margin-top:6px;font-style:italic}

/* ═══ CTA ═══ */
.cta-section{
  background:linear-gradient(170deg,var(--navy) 0%,var(--navy-deep) 100%);
  display:flex;align-items:center;justify-content:center;padding:100px 48px;text-align:center;
}
.cta-inner{max-width:540px;width:100%;position:relative;z-index:3}
.cta-title{
  font-family:var(--font-h);font-weight:900;font-size:clamp(28px,4.2vw,50px);
  line-height:1.08;color:var(--pure-white);margin-bottom:16px;letter-spacing:-.02em;
}
.cta-subtitle{font-size:16px;color:rgba(255,255,255,.6);margin-bottom:40px}
.cta-form-card{margin:0 auto}

/* ═══ LEGAL ═══ */
.legal{background:var(--navy-deep);min-height:auto !important}
.legal-inner{max-width:520px;margin:0 auto;padding:52px 32px;text-align:center}
.legal-text{font-size:12px;line-height:1.85;color:rgba(255,255,255,.3)}
.legal-text a{color:var(--aqua);text-decoration:none}
.legal-bar{width:40px;height:2px;background:rgba(45,212,191,.18);margin:22px auto}
.legal-brand{font-family:var(--font-h);font-size:11px;font-weight:600;color:rgba(255,255,255,.2);letter-spacing:.12em;text-transform:uppercase}

/* ═══ NAV DOTS ═══ */
.nav-dots{
  position:fixed;right:24px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:18px;z-index:100;
}
.nav-dot{
  width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
  background:transparent;cursor:pointer;transition:all .3s;padding:0;position:relative;
}
.nav-dot.active{background:var(--aqua);border-color:var(--aqua);box-shadow:0 0 12px var(--aqua-glow)}
.nav-dot:hover{border-color:var(--aqua)}
.nav-dot-label{
  position:absolute;right:22px;top:50%;transform:translateY(-50%);
  font-family:var(--font-h);font-size:10px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.45);white-space:nowrap;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.nav-dot:hover .nav-dot-label,.nav-dot.active .nav-dot-label{opacity:1}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .hero-content{padding:60px 36px 100px 44px}
}
@media(max-width:768px){
  .hero-layout{min-height:auto;display:flex;flex-direction:column}
  .hero-content{padding:56px 24px 40px;min-height:auto;max-width:100%}
  .hero-img-col{position:relative;height:55vh;order:2}
  .hero-img-col::before{
    background:linear-gradient(to bottom,var(--navy-deep) 0%,transparent 35%,transparent 75%,var(--navy-deep) 100%);
  }
  .hero-img-col::after{display:none}
  .hero-img-col img{object-position:center 20%}
  .hero-title{font-size:clamp(30px,8vw,42px)}
  .benefits,.social-proof,.cta-section{padding:72px 24px}
  .testi-grid{grid-template-columns:1fr}
  .form-card{padding:22px}
  .nav-dots{right:14px;gap:14px}
  .nav-dot{width:10px;height:10px}
  .nav-dot-label{display:none}
}
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
/* Form submission handler */
window.submitLead = function(btn) {
  var form = btn.closest('.form-card');
  var email = form.querySelector('[type=email]');
  if (!email || !email.value || !email.value.includes('@')) {
    email.style.borderColor = '#ef4444';
    email.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.25)';
    email.focus();
    setTimeout(function(){ email.style.borderColor = ''; email.style.boxShadow = ''; }, 2000);
    return;
  }
  btn.innerHTML = '✓ Enviado! Verifique seu email';
  btn.style.background = '#10b981';
  btn.style.pointerEvents = 'none';
};
</script>

<script type="text/babel" src="surf-app.jsx"></script>
</body>
</html>
